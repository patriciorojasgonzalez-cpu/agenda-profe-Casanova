<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMsSCMbBO2cUeTC9vc_U4IK_N9g3mPIR8",
    authDomain: "agenda-profe-casanova.firebaseapp.com",
    projectId: "agenda-profe-casanova",
    storageBucket: "agenda-profe-casanova.firebasestorage.app",
    messagingSenderId: "538652065887",
    appId: "1:538652065887:web:f85d1c84ad7fca8e3a1bea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.reservar = async function () {
    const nombre = document.getElementById("nombre").value;
    const fecha = document.getElementById("fecha").value;
    const hora = document.getElementById("hora").value;

    if (!nombre || !fecha || !hora) {
      alert("Completa todos los campos");
      return;
    }

    try {
      await addDoc(collection(db, "citas"), {
        nombre,
        fecha,
        hora
      });

      alert("Reserva guardada correctamente ✅");

      const mensaje = `Hola! Quiero agendar una clase de batería 🥁
Nombre: ${nombre}
Fecha: ${fecha}
Hora: ${hora}`;

      const numero = "56993072767";
      const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

      window.open(url, "_blank");

    } catch (error) {
      console.error(error);
      alert("Error al guardar la reserva");
    }
  };
</script>
